<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chatPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="icon.png">
  <style>
    body { background: #f8f9fa; }
    .chat-container { max-width: 400px; margin: 30px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px #0001; }
    .chat-header { background: #0d6efd; color: #fff; border-radius: 10px 10px 0 0; padding: 1rem; }
    .chat-messages { height: 400px; overflow-y: auto; padding: 1rem; background: #e9ecef; }
    .chat-input { border-top: 1px solid #dee2e6; padding: 1rem; }
    .message.me { text-align: right; }
    .message .bubble { display: inline-block; padding: 0.5rem 1rem; border-radius: 20px; margin-bottom: 0.5rem; }
    .message.me .bubble { background: #0d6efd; color: #fff; }
    .message.them .bubble { background: #dee2e6; color: #222; }
    .user-list { max-height: 200px; overflow-y: auto; }
    .user-item { cursor: pointer; }
    .user-item.active { background: #e2e6ea; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header d-flex align-items-center justify-content-between">
      <span id="currentUser">Carregando...</span>
      <button class="btn btn-sm btn-light" id="logoutBtn">Sair</button>
    </div>
    <div class="row g-0">
      <div class="col-4 border-end">
        <div class="user-list list-group" id="userList"></div>
      </div>
      <div class="col-8">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input input-group">
          <input type="text" class="form-control" id="messageInput" placeholder="Digite uma mensagem...">
          <button class="btn btn-primary" id="sendBtn">Enviar</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
